type = "mbart"

[task]
denoise_loss_ratio = 0.0
denoise_langs = []
source_langs = ["br"]
target_langs = ["fr"]
strict_langs = false

[tuning]
batch_size = 64               # termes courts → gros batch
learning_rate = 3e-5          # LR réduit (continued fine-tuning)
gradient_clipping = 1.0
max_input_length = 128        # termes courts
max_epochs = 10
warmup_steps = 500
